# Free tier: no persistent disk (disks block removed). Server SQLite/VAPID files are ephemeral.
# For persistent disk, use a paid Render plan and restore disk + DATA_DIR=/var/data
services:
  - type: web
    name: idea-planner
    env: node
    plan: free
    buildCommand: npm install && npm install --prefix server && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: VAPID_SUBJECT
        value: mailto:you@example.com

