services:
  - type: web
    name: idea-planner
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    disk:
      name: idea-planner-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /var/data
      - key: VAPID_SUBJECT
        value: mailto:you@example.com

